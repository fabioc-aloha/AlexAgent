<svg width="1280" height="420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient: deep navy → indigo-tinted → navy -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="40%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <!-- Primary accent: indigo → purple (CorreaX brand) -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <!-- Teal accent for secondary elements -->
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#14b8a6"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
    <!-- Radial glow behind the title -->
    <radialGradient id="centerGlow" cx="50%" cy="45%" r="35%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="420" fill="url(#bg)"/>

  <!-- Center radial glow -->
  <rect width="1280" height="420" fill="url(#centerGlow)"/>

  <!-- Left 4px accent bar (CorreaX banner signature) -->
  <rect x="0" y="0" width="4" height="420" fill="#6366f1"/>

  <!-- Subtle horizontal rules -->
  <g opacity="0.03">
    <line x1="0" y1="84" x2="1280" y2="84" stroke="#f1f5f9" stroke-width="0.5"/>
    <line x1="0" y1="168" x2="1280" y2="168" stroke="#f1f5f9" stroke-width="0.5"/>
    <line x1="0" y1="252" x2="1280" y2="252" stroke="#f1f5f9" stroke-width="0.5"/>
    <line x1="0" y1="336" x2="1280" y2="336" stroke="#f1f5f9" stroke-width="0.5"/>
  </g>

  <!-- Neural network — left teal cluster -->
  <g opacity="0.22">
    <circle cx="70" cy="90" r="3.5" fill="#14b8a6"/>
    <circle cx="130" cy="60" r="3" fill="#14b8a6"/>
    <circle cx="110" cy="140" r="4" fill="#14b8a6"/>
    <circle cx="50" cy="170" r="3" fill="#0d9488"/>
    <circle cx="160" cy="120" r="3.5" fill="#14b8a6"/>
    <circle cx="40" cy="110" r="2.5" fill="#0d9488"/>
    <circle cx="180" cy="70" r="2.5" fill="#0d9488"/>
    <circle cx="95" cy="210" r="2" fill="#14b8a6"/>
    <circle cx="155" cy="190" r="2.5" fill="#0d9488"/>
    <line x1="70" y1="90" x2="130" y2="60" stroke="#14b8a6" stroke-width="0.7" opacity="0.5"/>
    <line x1="70" y1="90" x2="110" y2="140" stroke="#14b8a6" stroke-width="0.7" opacity="0.5"/>
    <line x1="130" y1="60" x2="160" y2="120" stroke="#14b8a6" stroke-width="0.7" opacity="0.35"/>
    <line x1="110" y1="140" x2="50" y2="170" stroke="#14b8a6" stroke-width="0.7" opacity="0.35"/>
    <line x1="160" y1="120" x2="180" y2="70" stroke="#0d9488" stroke-width="0.7" opacity="0.25"/>
    <line x1="40" y1="110" x2="70" y2="90" stroke="#0d9488" stroke-width="0.7" opacity="0.25"/>
    <line x1="110" y1="140" x2="155" y2="190" stroke="#14b8a6" stroke-width="0.6" opacity="0.2"/>
    <line x1="50" y1="170" x2="95" y2="210" stroke="#0d9488" stroke-width="0.6" opacity="0.2"/>
  </g>

  <!-- Neural network — right purple cluster -->
  <g opacity="0.22">
    <circle cx="1210" cy="290" r="3.5" fill="#7c3aed"/>
    <circle cx="1160" cy="330" r="3" fill="#7c3aed"/>
    <circle cx="1180" cy="260" r="4" fill="#7c3aed"/>
    <circle cx="1240" cy="350" r="3" fill="#6366f1"/>
    <circle cx="1130" cy="300" r="3.5" fill="#6366f1"/>
    <circle cx="1250" cy="270" r="2.5" fill="#6366f1"/>
    <circle cx="1110" cy="340" r="2.5" fill="#7c3aed"/>
    <circle cx="1195" cy="220" r="2" fill="#6366f1"/>
    <circle cx="1140" cy="240" r="2.5" fill="#7c3aed"/>
    <line x1="1210" y1="290" x2="1160" y2="330" stroke="#7c3aed" stroke-width="0.7" opacity="0.5"/>
    <line x1="1210" y1="290" x2="1180" y2="260" stroke="#7c3aed" stroke-width="0.7" opacity="0.5"/>
    <line x1="1160" y1="330" x2="1130" y2="300" stroke="#7c3aed" stroke-width="0.7" opacity="0.35"/>
    <line x1="1180" y1="260" x2="1250" y2="270" stroke="#6366f1" stroke-width="0.7" opacity="0.35"/>
    <line x1="1240" y1="350" x2="1110" y2="340" stroke="#6366f1" stroke-width="0.7" opacity="0.25"/>
    <line x1="1180" y1="260" x2="1195" y2="220" stroke="#6366f1" stroke-width="0.6" opacity="0.2"/>
    <line x1="1140" y1="240" x2="1180" y2="260" stroke="#7c3aed" stroke-width="0.6" opacity="0.2"/>
  </g>

  <!-- Scattered connector nodes across bottom -->
  <g opacity="0.12">
    <circle cx="280" cy="350" r="2" fill="#14b8a6"/>
    <circle cx="380" cy="370" r="2.5" fill="#6366f1"/>
    <circle cx="480" cy="345" r="2" fill="#7c3aed"/>
    <circle cx="820" cy="355" r="2.5" fill="#14b8a6"/>
    <circle cx="920" cy="340" r="2" fill="#6366f1"/>
    <circle cx="1020" cy="365" r="2" fill="#7c3aed"/>
    <line x1="280" y1="350" x2="380" y2="370" stroke="#334155" stroke-width="0.5"/>
    <line x1="380" y1="370" x2="480" y2="345" stroke="#334155" stroke-width="0.5"/>
    <line x1="820" y1="355" x2="920" y2="340" stroke="#334155" stroke-width="0.5"/>
    <line x1="920" y1="340" x2="1020" y2="365" stroke="#334155" stroke-width="0.5"/>
  </g>

  <!-- Floating connector dots (far-field ambiance) -->
  <g opacity="0.08">
    <circle cx="250" cy="70" r="1.5" fill="#818cf8"/>
    <circle cx="350" cy="50" r="1.5" fill="#2dd4bf"/>
    <circle cx="950" cy="55" r="1.5" fill="#818cf8"/>
    <circle cx="1050" cy="75" r="1.5" fill="#2dd4bf"/>
    <line x1="250" y1="70" x2="350" y2="50" stroke="#334155" stroke-width="0.4"/>
    <line x1="950" y1="55" x2="1050" y2="75" stroke="#334155" stroke-width="0.4"/>
  </g>

  <!-- Plugin icon: brain with synaptic connections -->
  <g transform="translate(541, 42)" filter="url(#softglow)" opacity="0.55">
    <!-- Brain outline -->
    <path d="M 24 8 C 24 4, 28 0, 34 0 C 38 0, 42 2, 44 6 C 46 2, 52 0, 56 2 C 62 4, 64 10, 62 16 C 66 18, 68 24, 66 30 C 68 34, 66 40, 62 42 C 62 48, 56 52, 50 50 C 46 54, 40 54, 36 50 C 32 54, 26 52, 24 48 C 18 48, 14 42, 16 36 C 12 32, 12 26, 16 22 C 14 16, 16 10, 24 8 Z"
          fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.8"/>
    <!-- Brain centerline -->
    <path d="M 40 4 C 38 14, 42 24, 38 34 C 36 40, 40 48, 40 52"
          fill="none" stroke="url(#accent)" stroke-width="1.2" opacity="0.35"/>
    <!-- Synaptic dots inside brain -->
    <circle cx="30" cy="20" r="2" fill="#6366f1" opacity="0.7"/>
    <circle cx="50" cy="18" r="2" fill="#7c3aed" opacity="0.7"/>
    <circle cx="34" cy="36" r="2" fill="#14b8a6" opacity="0.7"/>
    <circle cx="48" cy="34" r="2" fill="#818cf8" opacity="0.7"/>
    <!-- Radiating connection lines from brain -->
    <line x1="24" y1="24" x2="4" y2="16" stroke="#6366f1" stroke-width="0.6" opacity="0.3"/>
    <line x1="56" y1="20" x2="76" y2="12" stroke="#7c3aed" stroke-width="0.6" opacity="0.3"/>
    <line x1="22" y1="40" x2="2" y2="46" stroke="#14b8a6" stroke-width="0.6" opacity="0.3"/>
    <line x1="58" y1="38" x2="78" y2="44" stroke="#818cf8" stroke-width="0.6" opacity="0.3"/>
    <circle cx="4" cy="16" r="1.5" fill="#6366f1" opacity="0.4"/>
    <circle cx="76" cy="12" r="1.5" fill="#7c3aed" opacity="0.4"/>
    <circle cx="2" cy="46" r="1.5" fill="#14b8a6" opacity="0.4"/>
    <circle cx="78" cy="44" r="1.5" fill="#818cf8" opacity="0.4"/>
  </g>

  <!-- Eyebrow label (CorreaX banner pattern) -->
  <text x="640" y="120" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="700"
        text-anchor="middle" fill="#818cf8" letter-spacing="5" opacity="0.85">
    COGNITIVE ARCHITECTURE
  </text>

  <!-- Main title: ALEX -->
  <text x="640" y="200" font-family="'Segoe UI', system-ui, sans-serif" font-size="96" font-weight="800"
        text-anchor="middle" fill="url(#accent)" filter="url(#glow)" letter-spacing="12">
    ALEX
  </text>

  <!-- Subtitle -->
  <text x="640" y="252" font-family="'Segoe UI', system-ui, sans-serif" font-size="26" font-weight="600"
        text-anchor="middle" fill="#f1f5f9" opacity="0.9" letter-spacing="8">
    AGENT PLUGIN
  </text>

  <!-- Accent divider -->
  <rect x="540" y="272" width="200" height="2" rx="1" fill="url(#accent)" opacity="0.35"/>

  <!-- Feature stats -->
  <text x="640" y="308" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" font-weight="400"
        text-anchor="middle" fill="#94a3b8" letter-spacing="1.5">
    84 Skills  ·  7 Agents  ·  22 Instructions  ·  MCP Tools
  </text>

  <!-- Bottom tagline -->
  <text x="640" y="370" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="400"
        text-anchor="middle" fill="#94a3b8" opacity="0.5" letter-spacing="3">
    The AI that grows with you — No extension required
  </text>

  <!-- Ghost watermark (CorreaX signature, 0.15 opacity) -->
  <text x="1180" y="280" font-family="'Segoe UI', system-ui, sans-serif" font-size="120" font-weight="800"
        text-anchor="middle" fill="#f1f5f9" opacity="0.03" letter-spacing="4">
    ALEX
  </text>

  <!-- CorreaX mark -->
  <text x="640" y="408" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="300"
        text-anchor="middle" fill="#f1f5f9" opacity="0.15" letter-spacing="4">
    CORREAX
  </text>
</svg>
