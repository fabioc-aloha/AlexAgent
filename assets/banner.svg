<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <!-- Background: flat deep navy -->
  <rect width="1200" height="300" fill="#0f172a"/>

  <!-- Left 4px accent bar -->
  <rect x="0" y="0" width="4" height="300" fill="#6366f1"/>

  <!-- Ghost watermark: "ALEX" right-aligned, 10% opacity -->
  <text x="1180" y="260" font-family="'Segoe UI', system-ui, sans-serif" font-size="160" font-weight="800"
        fill="#f1f5f9" opacity="0.10" text-anchor="end">ALEX</text>

  <!-- Neural network — right side, hollow ring nodes with connections -->
  <line x1="920" y1="100" x2="1000" y2="145" stroke="#6366f1" stroke-width="1.5" opacity="0.18"/>
  <line x1="1000" y1="145" x2="970" y2="210" stroke="#818cf8" stroke-width="1.5" opacity="0.15"/>
  <line x1="920" y1="100" x2="1060" y2="85" stroke="#6366f1" stroke-width="1.5" opacity="0.15"/>
  <line x1="1060" y1="85" x2="1000" y2="145" stroke="#6366f1" stroke-width="1.5" opacity="0.12"/>
  <line x1="1000" y1="145" x2="1080" y2="185" stroke="#818cf8" stroke-width="1.5" opacity="0.12"/>
  <line x1="970" y1="210" x2="1080" y2="185" stroke="#6366f1" stroke-width="1.5" opacity="0.10"/>
  <line x1="1060" y1="85" x2="1130" y2="130" stroke="#818cf8" stroke-width="1.5" opacity="0.10"/>
  <circle cx="920" cy="100" r="10" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.30"/>
  <circle cx="1000" cy="145" r="14" fill="none" stroke="#818cf8" stroke-width="2" opacity="0.25"/>
  <circle cx="1060" cy="85" r="8" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.22"/>
  <circle cx="970" cy="210" r="11" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.22"/>
  <circle cx="1080" cy="185" r="8" fill="none" stroke="#818cf8" stroke-width="2" opacity="0.18"/>
  <circle cx="1130" cy="130" r="6" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.15"/>

  <!-- Eyebrow label -->
  <text x="40" y="80" font-family="'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="700"
        fill="#94a3b8" letter-spacing="5">ALEX AGENT PLUGIN</text>

  <!-- Main title -->
  <text x="40" y="175" font-family="'Segoe UI', system-ui, sans-serif" font-size="82" font-weight="700"
        fill="#f1f5f9">Agent Plugin</text>

  <!-- Subtitle -->
  <text x="40" y="230" font-family="'Segoe UI', system-ui, sans-serif" font-size="26" font-weight="600"
        fill="#94a3b8">84 Skills · 7 Agents · 22 Instructions · MCP Tools</text>

  <!-- Bottom tagline -->
  <text x="40" y="275" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="400"
        fill="#94a3b8" opacity="0.5">No extension required — install cognitive architecture in any VS Code</text>
</svg>
